<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#2c5282" />
  <title>オフライン - Talk Abroad</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: system-ui, sans-serif;
      background: #f8f7f4;
      color: #4a5568;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    .card {
      max-width: 24rem;
      text-align: center;
    }
    h1 { font-size: 1.25rem; margin: 0 0 0.75rem; color: #2c5282; }
    p { font-size: 0.9375rem; line-height: 1.6; color: #6b7280; margin: 0 0 1.5rem; }
    .note { font-size: 0.8125rem; color: #6b7280; margin-top: 1rem; }
    button {
      background: #2c5282;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 0.75rem;
      cursor: pointer;
      min-height: 48px;
    }
    button:active { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="card">
    <h1>オフラインです</h1>
    <p>通信が不安定なようです。ネットワークがつながったら、もう一度お試しください。</p>
    <p class="note">保存した復習データは端末に残っています。通信が復帰すると続きをご利用いただけます。</p>
    <button type="button" onclick="window.location.reload()">再試行</button>
  </div>
</body>
</html>
